global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "mcp_java_benchmark"
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          variant: "java_baseline"
      - targets: ["host.docker.internal:9101"]
        labels:
          variant: "java_structured"

  - job_name: "mcp_rust_benchmark"
    fallback_scrape_protocol: PrometheusText0.0.4
    static_configs:
      - targets: ["host.docker.internal:9102"]
        labels:
          variant: "rust_baseline"
      - targets: ["host.docker.internal:9103"]
        labels:
          variant: "rust_structured"